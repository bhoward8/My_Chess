name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: chess_engine/requirements.txt

      - name: Install dependencies
        run: pip install -r chess_engine/requirements.txt

      - name: Run tests
        working-directory: chess_engine
        run: |
          python -m pytest tests/ -v \
            --junitxml=test-results.xml \
            --cov=engine \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=md:/dev/stdout >> $GITHUB_STEP_SUMMARY

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Pytest (Python ${{ matrix.python-version }})
          path: chess_engine/test-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            chess_engine/test-results.xml
            chess_engine/coverage.xml
